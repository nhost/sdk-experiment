  /ops/list-orphans:
    post:
      description: Orphaned files are files that are present in the storage but have
        no associated metadata
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ops_list_orphans_post_200_response'
          description: Successfully computed orphaned files
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - X-Hasura-Admin-Secret: []
      summary: Lists orphaned files
      tags:
      - operations
  /ops/delete-orphans:
    post:
      description: Orphaned files are files that are present in the storage but have
        no associated metadata
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ops_list_orphans_post_200_response'
          description: Successfully deleted orphaned files
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - X-Hasura-Admin-Secret: []
      summary: Deletes orphaned files
      tags:
      - operations
  /ops/list-broken-metadata:
    post:
      description: Broken metadata is defined as metadata that has isUploaded = true
        but there is no file in the storage matching it
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ops_list_broken_metadata_post_200_response'
          description: Successfully computed broken metadata
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - X-Hasura-Admin-Secret: []
      summary: Lists broken metadata
      tags:
      - operations
  /ops/delete-broken-metadata:
    post:
      description: Broken metadata is defined as metadata that has isUploaded = true
        but there is no file in the storage matching it
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ops_list_broken_metadata_post_200_response'
          description: Successfully deleted broken metadata
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - X-Hasura-Admin-Secret: []
      summary: Delete broken metadata
      tags:
      - operations
  /ops/list-not-uploaded:
    post:
      description: "That is, metadata that has isUploaded = false"
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_ops_list_broken_metadata_post_200_response'
          description: Successfully checked files not uploaded
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - X-Hasura-Admin-Secret: []
      summary: Lists files that haven't been uploaded
      tags:
      - operations
