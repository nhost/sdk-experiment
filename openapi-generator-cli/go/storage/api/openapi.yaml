openapi: 3.0.3
info:
  description: Hasura Storage is amazing
  license:
    name: LICENSE-TBD
    url: https://LICENSE-TBD
  title: Hasura Storage
  version: 1.0.0
servers:
- description: The development API server
  url: "http://{domain}:{port}/v1"
  variables:
    domain:
      default: localhost
    port:
      default: "8000"
security:
- Authorization: []
- X-Hasura-Admin-Secret: []
paths:
  /openapi.yaml:
    get:
      responses:
        "200":
          content:
            application/x-yaml:
              schema:
                type: object
          description: Return this schema definition
      summary: Return this schema definition
      tags:
      - documentation
  /version:
    get:
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionInformation'
          description: Return build information
      summary: Retrieve build information about the server
      tags:
      - documentation
  /files/:
    post:
      description: "You can upload more than one file by sending several file[]. Sending\
        \ the metadata[] for files is optional but if you are uploading many files\
        \ you need to either specify the metadata for all or for none."
      requestBody:
        content:
          multipart/form-data:
            encoding:
              file[]:
                contentType: application/octet-stream
                style: form
            schema:
              $ref: '#/components/schemas/_files__post_request'
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_files__post_200_response'
          description: File was uploaded successfully
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/_files__post_201_response'
          description: File was uploaded successfully
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - Authorization: []
      summary: Upload one or more files
      tags:
      - storage
  /files/{id}:
    delete:
      description: Delete a file
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: File was deleted successfully
        default:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
          description: En error occured
      security:
      - Authorization: []
      summary: Delete a file
      tags:
      - storage
    get:
      description: Retrieve contents of file
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/If-Match
        explode: false
        in: header
        name: if-match
        required: false
        schema:
          type: string
        style: simple
      - description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/If-None-Match
        explode: false
        in: header
        name: if-none-match
        required: false
        schema:
          type: string
        style: simple
      - description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/If-Modified-Since
        explode: false
        in: header
        name: if-modified-since
        required: false
        schema:
          type: string
        style: simple
      - description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/If-Unmodified-Since
        explode: false
        in: header
        name: if-unmodified-since
        required: false
        schema:
          type: string
        style: simple
      - description: "Quality of the image. Only applies to jpeg, webp and png files"
        explode: true
        in: query
        name: q
        required: false
        schema:
          type: number
        style: form
      - description: "Resize image up to h maintaining aspect ratio. Only applies\
          \ to jpeg, webp and png files"
        explode: true
        in: query
        name: h
        required: false
        schema:
          type: number
        style: form
      - description: "Resize image up to w maintaining aspect ratio. Only applies\
          \ to jpeg, webp and png files"
        explode: true
        in: query
        name: w
        required: false
        schema:
          type: number
        style: form
      - description: "Blur the image according to this sigma value. Only applies to\
          \ jpeg, webp and png files"
        explode: true
        in: query
        name: b
        required: false
        schema:
          type: number
        style: form
      responses:
        "200":
          content:
            application/octet-stream: {}
          description: File gathered successfully
          headers:
            Cache-Control:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cache-Control
              explode: false
              schema:
                type: string
              style: simple
            Content-Length:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Length
              explode: false
              schema:
                type: number
              style: simple
            Content-Type:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Type
              explode: false
              schema:
                type: string
              style: simple
            Etag:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Etag
              explode: false
              schema:
                type: string
              style: simple
            Last-Modified:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Last-Modified
              explode: false
              schema:
                type: string
              style: simple
        "304":
          description: |
            File hasn't been modified based on:
            - file modification time is older than If-Modified-Since
          headers:
            Cache-Control:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cache-Control
              explode: false
              schema:
                type: string
              style: simple
            Content-Length:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Length
              explode: false
              schema:
                type: number
              style: simple
            Content-Type:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Type
              explode: false
              schema:
                type: string
              style: simple
            Etag:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Etag
              explode: false
              schema:
                type: string
              style: simple
            Last-Modified:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Last-Modified
              explode: false
              schema:
                type: string
              style: simple
        "412":
          description: |
            Some of the conditions specified in the headers failed to match. For instance:
              - etag doesn't match one of If-Match
              - etag matches one of If-None-Match
              - if-unmodified-since is false
          headers:
            Cache-Control:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Cache-Control
              explode: false
              schema:
                type: string
              style: simple
            Content-Length:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Length
              explode: false
              schema:
                type: number
              style: simple
            Content-Type:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Type
              explode: false
              schema:
                type: string
              style: simple
            Etag:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Etag
              explode: false
              schema:
                type: string
              style: simple
            Last-Modified:
              description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Last-Modified
              explode: false
              schema:
                type: string
              style: simple
        default:
          description: Some error occurred
          headers:
            X-Error:
              description: An error message
              explode: false
              schema:
                type: string
              style: simple
      security:
      - Authorization: []
      summary: Retrieve contents of file
      tags:
      - storage
    head:
      description: Retrieve information about a file
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/If-Match
